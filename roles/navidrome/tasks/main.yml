---
# =============================================================================
# PACKAGE INSTALLATION
# =============================================================================

- name: Install required packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - cifs-utils
      - python3-passlib
      - python3-docker
      - netcat-openbsd
      - restic
      - cron
    state: present
    update_cache: true
  become: true

- name: Create directory for Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Set Docker GPG key permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.asc
    mode: '0644'
    owner: root
    group: root

- name: Get system architecture
  ansible.builtin.command: dpkg --print-architecture
  register: navidrome_system_arch
  changed_when: false
  become: true

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ navidrome_system_arch.stdout }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_facts['distribution_release'] }} stable
    state: present
    filename: docker
  become: true

- name: Install Docker and Docker Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

# =============================================================================
# CHECK FOR EXISTING INSTALLATION
# =============================================================================

- name: Check if Navidrome is already installed
  ansible.builtin.stat:
    path: /opt/navidrome/data/navidrome.db
  register: navidrome_existing
  become: true

- name: Set installation type
  ansible.builtin.set_fact:
    navidrome_is_fresh_install: "{{ not navidrome_existing.stat.exists }}"

# =============================================================================
# CREDENTIALS GENERATION
# =============================================================================

- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ playbook_dir }}/credentials/hosts/{{ inventory_hostname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Generate Restic password
  ansible.builtin.set_fact:
    restic_navidrome_password: >-
      {{ lookup('ansible.builtin.password',
      playbook_dir + '/credentials/hosts/' + inventory_hostname +
      '/restic_navidrome_password.txt chars=ascii_letters,digits length=32') }}

# =============================================================================
# DIRECTORY STRUCTURE
# =============================================================================

- name: Create navidrome application directory
  ansible.builtin.file:
    path: /opt/navidrome
    state: directory
    mode: '0755'
    owner: 1000
    group: 1000

- name: Create navidrome data directory
  ansible.builtin.file:
    path: /opt/navidrome/data
    state: directory
    mode: '0755'
    owner: 1000
    group: 1000

- name: Create NAS mount point directory
  ansible.builtin.file:
    path: /mnt/music
    state: directory
    mode: '0755'
    owner: 1000
    group: 1000
  become: true

# =============================================================================
# RESTIC CONFIGURATION & DISCOVERY
# =============================================================================

- name: Create Restic credentials file
  ansible.builtin.template:
    src: restic-env.sh.j2
    dest: /opt/navidrome/restic-env.sh
    mode: '0600'
    owner: root
    group: root
  become: true

- name: Check for existing backups (Fresh Install Only)
  ansible.builtin.shell: |
    source /opt/navidrome/restic-env.sh
    restic snapshots --json --latest 1 --insecure-tls || echo "[]"
  args:
    executable: /bin/bash
  register: navidrome_restic_check
  become: true
  changed_when: false
  when: navidrome_is_fresh_install

- name: Check Restic repository status
  ansible.builtin.shell: |
    source /opt/navidrome/restic-env.sh
    restic snapshots --json --latest 1 --insecure-tls </dev/null
  args:
    executable: /bin/bash
  register: navidrome_restic_check_result
  become: true
  changed_when: false
  failed_when: false

- name: Initialize Restic repository if missing
  ansible.builtin.shell: |
    source /opt/navidrome/restic-env.sh
    restic init --insecure-tls
  args:
    executable: /bin/bash
  become: true
  when:
    - navidrome_restic_check_result.rc != 0
    - >-
      'unable to open config file' in navidrome_restic_check_result.stderr or
      'Is there a repository' in navidrome_restic_check_result.stderr

- name: Determine if restore is needed
  ansible.builtin.set_fact:
    navidrome_backup_found: >-
      {{ (navidrome_restic_check.stdout | default('[]') |
      from_json | length > 0) }}
  when: navidrome_is_fresh_install

# =============================================================================
# NAS MOUNT CONFIGURATION
# =============================================================================

- name: Create systemd NAS credentials file
  ansible.builtin.copy:
    content: |
      username={{ navidrome_nas_user }}
      password={{ navidrome_nas_password }}
    dest: /etc/navidrome-nas-credentials
    mode: '0600'
    owner: root
    group: root
  become: true
  no_log: true

- name: Create systemd mount unit for NAS (read-only)
  ansible.builtin.template:
    src: mnt-music.mount.j2
    dest: /etc/systemd/system/mnt-music.mount
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Create wait-for-nas systemd service
  ansible.builtin.template:
    src: wait-for-nas.service.j2
    dest: /etc/systemd/system/wait-for-nas.service
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Enable wait-for-nas service
  ansible.builtin.systemd:
    name: wait-for-nas.service
    enabled: true
    daemon_reload: true
  become: true

- name: Enable and start NAS mount
  ansible.builtin.systemd:
    name: mnt-music.mount
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Wait for mount to be ready
  ansible.builtin.wait_for:
    path: /mnt/music
    state: present
    timeout: 60
  become: true

- name: Verify music files are accessible
  ansible.builtin.command: ls -A /mnt/music
  register: navidrome_music_check
  changed_when: false
  failed_when: navidrome_music_check.stdout == ""
  become: true

# =============================================================================
# DOCKER COMPOSE DEPLOYMENT
# =============================================================================

- name: Create docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/navidrome/docker-compose.yml
    mode: '0644'
    owner: 1000
    group: 1000
  become: true

- name: Start Navidrome with Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/navidrome
    state: present
    pull: "always"
  become: true

- name: Wait for Navidrome to be ready
  ansible.builtin.wait_for:
    port: 80
    delay: 10
    timeout: 120

# =============================================================================
# RESTORE FROM RESTIC (Fresh Install Only)
# =============================================================================

- name: Restore Navidrome database from Restic
  ansible.builtin.shell: |
    source /opt/navidrome/restic-env.sh
    cd /opt/navidrome
    docker compose down
    restic restore latest --tag navidrome-db --target / --insecure-tls
    chown 1000:1000 /opt/navidrome/data/navidrome.db
    chmod 644 /opt/navidrome/data/navidrome.db
    docker compose up -d
  args:
    executable: /bin/bash
  become: true
  register: navidrome_restore_result
  changed_when: navidrome_restore_result.rc == 0
  failed_when: navidrome_restore_result.rc != 0
  when:
    - navidrome_is_fresh_install
    - navidrome_backup_found
    - not (navidrome_force_fresh | default(false))

- name: Wait for Navidrome after restore
  ansible.builtin.wait_for:
    port: 80
    delay: 10
    timeout: 120
  when:
    - navidrome_is_fresh_install
    - navidrome_backup_found
    - not (navidrome_force_fresh | default(false))

# =============================================================================
# SYSTEMD SERVICE CONFIGURATION
# =============================================================================

- name: Create navidrome systemd service
  ansible.builtin.template:
    src: navidrome.service.j2
    dest: /etc/systemd/system/navidrome.service
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Enable and start navidrome service
  ansible.builtin.systemd:
    name: navidrome.service
    enabled: true
    state: started
    daemon_reload: true
  become: true

# =============================================================================
# BACKUP AUTOMATION
# =============================================================================

- name: Create backup script
  ansible.builtin.template:
    src: navidrome-backup.sh.j2
    dest: /opt/navidrome/backup.sh
    mode: '0755'
  become: true

- name: Create backup cron job
  ansible.builtin.cron:
    name: "Navidrome daily backup"
    minute: "0"
    hour: "3"
    job: "/opt/navidrome/backup.sh >> /var/log/navidrome-backup.log 2>&1"
    user: root
  become: true

- name: Create log rotation for backup
  ansible.builtin.copy:
    dest: /etc/logrotate.d/navidrome-backup
    content: |
      /var/log/navidrome-backup.log {
          daily
          rotate 7
          compress
          missingok
          notifempty
      }
    mode: '0644'
  become: true

# =============================================================================
# LEGACY CLEANUP
# =============================================================================

- name: Remove old NAS backup directory mount
  ansible.posix.mount:
    path: /mnt/navidrome_backup
    state: absent
  become: true

- name: Remove old backup script
  ansible.builtin.file:
    path: /opt/navidrome/backup_navidrome.sh
    state: absent
  become: true

- name: Remove old backup cron job
  ansible.builtin.cron:
    name: "Backup Navidrome to NAS"
    state: absent
  become: true

# =============================================================================
# FIREWALL
# =============================================================================

- name: Allow Navidrome port through firewall
  community.general.ufw:
    rule: allow
    port: 80
    proto: tcp
  become: true
  notify: Reload ufw

# =============================================================================
# FIRST RUN INSTRUCTIONS
# =============================================================================

- name: Display first run instructions
  ansible.builtin.debug:
    msg: |
      ===================================================================
      Navidrome installation complete!

      {% if navidrome_is_fresh_install and navidrome_backup_found %}
      ✓ Restored from Restic backup
      Your Navidrome instance should be ready with all previous data.
      {% elif navidrome_is_fresh_install %}
      ⚠ Fresh installation - no backup found to restore
      Access the web interface at: http://{{ ansible_host }}
      Create your admin account on first login.
      {% else %}
      ✓ Existing installation updated
      {% endif %}

      Web interface: http://{{ ansible_host }}
      Music library: /mnt/music (mounted read-only from NAS)
      ===================================================================
  when: >-
    navidrome_is_fresh_install or
    (navidrome_backup_found is defined and navidrome_backup_found)
