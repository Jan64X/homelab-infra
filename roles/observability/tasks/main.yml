---
# =============================================================================
# PACKAGE INSTALLATION
# =============================================================================

- name: Install required packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-requests
      - python3-docker
      - restic
      - cron
    state: present
    update_cache: true
  become: true

- name: Create directory for Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  become: true

- name: Set Docker GPG key permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.asc
    mode: '0644'
    owner: root
    group: root
  become: true

- name: Get system architecture
  ansible.builtin.command: dpkg --print-architecture
  register: observability_system_arch
  changed_when: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ observability_system_arch.stdout }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_facts['distribution_release'] }} stable
    state: present
    filename: docker
  become: true

- name: Install Docker and Docker Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

# =============================================================================
# CHECK FOR EXISTING INSTALLATION
# =============================================================================

- name: Check if Observability is already installed
  ansible.builtin.stat:
    path: /etc/monitoring/.ansible_managed
  register: observability_existing
  become: true

- name: Set installation type
  ansible.builtin.set_fact:
    observability_is_fresh_install: "{{ not observability_existing.stat.exists }}"

# =============================================================================
# CREDENTIALS GENERATION
# =============================================================================

- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ playbook_dir }}/credentials/hosts/{{ inventory_hostname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Generate Restic password
  ansible.builtin.set_fact:
    observability_restic_password: >-
      {{ lookup('ansible.builtin.password',
      playbook_dir + '/credentials/hosts/' + inventory_hostname +
      '/restic_observability_password.txt chars=ascii_letters,digits length=32') }}

- name: Generate Grafana admin password
  ansible.builtin.set_fact:
    observability_grafana_admin_password: >-
      {{ lookup('ansible.builtin.password',
      playbook_dir + '/credentials/hosts/' + inventory_hostname +
      '/grafana_admin_password.txt chars=ascii_letters,digits length=32') }}

# =============================================================================
# DIRECTORY STRUCTURE
# =============================================================================

- name: Create monitoring directories
  ansible.builtin.file:
    path: "{{ directory_item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/monitoring
    - /etc/monitoring/prometheus
    - /etc/monitoring/grafana
    - /etc/monitoring/grafana/dashboards
    - /etc/monitoring/grafana/provisioning
    - /etc/monitoring/grafana/provisioning/dashboards
    - /etc/monitoring/grafana/provisioning/datasources
    - /var/lib/prometheus
    - /var/lib/grafana
  loop_control:
    loop_var: directory_item
  become: true

- name: Set ownership for Grafana directory
  ansible.builtin.file:
    path: /var/lib/grafana
    owner: 472
    group: 472
    recurse: true
  become: true

- name: Set ownership for Prometheus directory
  ansible.builtin.file:
    path: /var/lib/prometheus
    owner: 65534
    group: 65534
    recurse: true
  become: true

# =============================================================================
# RESTIC CONFIGURATION & DISCOVERY
# =============================================================================

- name: Create Restic credentials file
  ansible.builtin.template:
    src: restic-env.sh.j2
    dest: /etc/monitoring/restic-env.sh
    mode: '0600'
    owner: root
    group: root
  become: true

- name: Check for existing backups (Fresh Install Only)
  ansible.builtin.shell: |
    source /etc/monitoring/restic-env.sh
    restic snapshots --json --latest 1 --insecure-tls || echo "[]"
  args:
    executable: /bin/bash
  register: observability_restic_check
  become: true
  changed_when: false
  when: observability_is_fresh_install

- name: Check Restic repository status
  ansible.builtin.shell: |
    source /etc/monitoring/restic-env.sh
    restic snapshots --json --latest 1 --insecure-tls </dev/null
  args:
    executable: /bin/bash
  register: observability_restic_check_result
  become: true
  changed_when: false
  failed_when: false

- name: Initialize Restic repository if missing
  ansible.builtin.shell: |
    source /etc/monitoring/restic-env.sh
    restic init --insecure-tls
  args:
    executable: /bin/bash
  become: true
  changed_when: true
  when:
    - observability_restic_check_result.rc != 0
    - >-
      'unable to open config file' in observability_restic_check_result.stderr or
      'Is there a repository' in observability_restic_check_result.stderr

- name: Determine if restore is needed
  ansible.builtin.set_fact:
    observability_backup_found: >-
      {{ (observability_restic_check.stdout | default('[]') |
      from_json | length > 0) }}
  when: observability_is_fresh_install

# =============================================================================
# CONFIGURATION FILES
# =============================================================================

- name: Configure Prometheus
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/monitoring/prometheus/prometheus.yml
    mode: '0644'
  become: true

- name: Configure Grafana datasource
  ansible.builtin.template:
    src: datasource.yml.j2
    dest: /etc/monitoring/grafana/provisioning/datasources/prometheus.yml
    mode: '0644'
  become: true

- name: Configure Grafana dashboard provisioning
  ansible.builtin.template:
    src: dashboard-provider.yml.j2
    dest: /etc/monitoring/grafana/provisioning/dashboards/default.yml
    mode: '0644'
  become: true

- name: Copy docker-compose.yml for monitoring stack
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /etc/monitoring/docker-compose.yml
    mode: '0644'
  become: true

# =============================================================================
# DOCKER COMPOSE DEPLOYMENT
# =============================================================================

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: /etc/monitoring
    state: present
    pull: "always"
  become: true

- name: Wait for Prometheus to be ready
  ansible.builtin.wait_for:
    port: 9090
    delay: 10
    timeout: 120

- name: Wait for Grafana to be ready
  ansible.builtin.wait_for:
    port: 80
    delay: 10
    timeout: 120

# =============================================================================
# RESTORE FROM RESTIC (Fresh Install Only)
# =============================================================================

- name: Restore Prometheus data from Restic
  ansible.builtin.shell: |
    source /etc/monitoring/restic-env.sh
    cd /etc/monitoring
    docker compose down
    restic restore latest --tag observability-prometheus --target / --insecure-tls
    chown -R 65534:65534 /var/lib/prometheus
    docker compose up -d
  args:
    executable: /bin/bash
  become: true
  register: observability_prometheus_restore_result
  changed_when: observability_prometheus_restore_result.rc == 0
  failed_when: observability_prometheus_restore_result.rc != 0
  when:
    - observability_is_fresh_install
    - observability_backup_found
    - not (observability_force_fresh | default(false))

- name: Restore Grafana data from Restic
  ansible.builtin.shell: |
    source /etc/monitoring/restic-env.sh
    cd /etc/monitoring
    docker compose down
    restic restore latest --tag observability-grafana --target / --insecure-tls
    chown -R 472:472 /var/lib/grafana
    docker compose up -d
  args:
    executable: /bin/bash
  become: true
  register: observability_grafana_restore_result
  changed_when: observability_grafana_restore_result.rc == 0
  failed_when: observability_grafana_restore_result.rc != 0
  when:
    - observability_is_fresh_install
    - observability_backup_found
    - not (observability_force_fresh | default(false))

- name: Wait for services after restore
  ansible.builtin.wait_for:
    port: "{{ item }}"
    delay: 10
    timeout: 120
  loop:
    - 9090
    - 80
  when:
    - observability_is_fresh_install
    - observability_backup_found
    - not (observability_force_fresh | default(false))

# =============================================================================
# BACKUP AUTOMATION
# =============================================================================

- name: Create backup script
  ansible.builtin.template:
    src: observability-backup.sh.j2
    dest: /etc/monitoring/backup.sh
    mode: '0755'
  become: true

- name: Create backup cron job
  ansible.builtin.cron:
    name: "Observability daily backup"
    minute: "0"
    hour: "4"
    job: "/etc/monitoring/backup.sh >> /var/log/observability-backup.log 2>&1"
    user: root
  become: true

- name: Create log rotation for backup
  ansible.builtin.copy:
    dest: /etc/logrotate.d/observability-backup
    content: |
      /var/log/observability-backup.log {
          daily
          rotate 7
          compress
          missingok
          notifempty
      }
    mode: '0644'
  become: true

# =============================================================================
# FINALIZATION
# =============================================================================

- name: Mark monitoring as Ansible managed
  ansible.builtin.copy:
    content: "Monitoring managed by Ansible on {{ ansible_facts['date_time']['iso8601'] }}"
    dest: /etc/monitoring/.ansible_managed
    owner: root
    group: root
    mode: '0644'
    force: false
  become: true

- name: Get external-monitor host IPs
  ansible.builtin.set_fact:
    observability_external_monitor_ips: >-
      {{ groups['all'] |
      map('extract', hostvars) |
      selectattr('host_roles', 'defined') |
      selectattr('host_roles', 'contains', 'external-monitor') |
      map(attribute='ansible_host') |
      list }}

# =============================================================================
# FIREWALL
# =============================================================================

- name: Allow Prometheus HTTP from external monitor VPS
  community.general.ufw:
    rule: allow
    port: 9090
    proto: tcp
    from_ip: "{{ item }}"
  loop: "{{ observability_external_monitor_ips }}"
  when: observability_external_monitor_ips | length > 0
  notify: Reload ufw

- name: Allow Grafana HTTP
  community.general.ufw:
    rule: allow
    port: 80
    proto: tcp
  notify: Reload ufw

# =============================================================================
# FIRST RUN INSTRUCTIONS
# =============================================================================

- name: Display first run instructions
  ansible.builtin.debug:
    msg: |
      ===================================================================
      Observability stack installation complete!

      {% if observability_is_fresh_install and observability_backup_found %}
      ✓ Restored from Restic backup
      Your Prometheus and Grafana instances should be ready with all previous data.
      {% elif observability_is_fresh_install %}
      ⚠ Fresh installation - no backup found to restore
      Access Grafana at: http://{{ ansible_host }}
      Username: admin
      Password: {{ observability_grafana_admin_password }}
      {% else %}
      ✓ Existing installation updated
      {% endif %}

      Grafana: http://{{ ansible_host }}
      Prometheus: http://{{ ansible_host }}:9090
      ===================================================================
  when: >-
    observability_is_fresh_install or
    (observability_backup_found is defined and observability_backup_found)
