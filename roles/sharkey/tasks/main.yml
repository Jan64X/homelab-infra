---
- name: Check if Sharkey container exists
  community.docker.docker_container_info:
    name: sharkey
  register: sharkey_container
  ignore_errors: true
  become: true

- name: Check if Sharkey initial setup is complete
  ansible.builtin.stat:
    path: /opt/sharkey/.setup_complete
  register: sharkey_setup_complete

- name: Check if Sharkey has been installed (restored from backup or fresh install)
  ansible.builtin.stat:
    path: /opt/sharkey/.installed
  register: sharkey_installed

- name: Install required packages for Docker repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-requests
      - restic
      - cron
    state: present
    update_cache: true
  become: true

- name: Create directory for Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  become: true

- name: Set Docker GPG key permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.asc
    mode: '0644'
    owner: root
    group: root
  become: true

- name: Get system architecture
  ansible.builtin.command: dpkg --print-architecture
  register: sharkey_system_arch
  changed_when: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ sharkey_system_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable
    state: present
    filename: docker
  become: true

- name: Install Docker and Docker Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

- name: Create Sharkey directories
  ansible.builtin.file:
    path: "{{ directory_item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/sharkey/
    - /opt/sharkey/.config
  loop_control:
    loop_var: directory_item
  become: true

# =============================================================================
# CREDENTIALS GENERATION
# =============================================================================

- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ playbook_dir }}/credentials/hosts/{{ inventory_hostname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Generate passwords
  ansible.builtin.set_fact:
    sharkey_db_password: "{{ lookup('ansible.builtin.password',
                         playbook_dir + '/credentials/hosts/' + inventory_hostname + '/sharkey_db_password.txt' +
                         ' chars=ascii_letters,digits length=32') }}"
    sharkey_initial_password: "{{ lookup('ansible.builtin.password',
                              playbook_dir + '/credentials/hosts/' + inventory_hostname + '/sharkey_initial_password.txt' +
                              ' chars=ascii_letters,digits length=32') }}"
    sharkey_restic_password: "{{ lookup('ansible.builtin.password',
                              playbook_dir + '/credentials/hosts/' + inventory_hostname + '/restic_sharkey_password.txt' +
                              ' chars=ascii_letters,digits length=32') }}"

# =============================================================================
# RESTIC CONFIGURATION & DISCOVERY
# =============================================================================

- name: Create Restic credentials file
  ansible.builtin.template:
    src: restic-env.sh.j2
    dest: /opt/sharkey/restic-env.sh
    mode: '0600'
    owner: root
    group: root
  become: true

- name: Check for existing backups (Fresh Install Only)
  ansible.builtin.shell: |
    source /opt/sharkey/restic-env.sh
    restic snapshots --json --latest 1 --insecure-tls || echo "[]"
  args:
    executable: /bin/bash
  register: sharkey_restic_check
  become: true
  changed_when: false
  when: not sharkey_installed.stat.exists

- name: Check Restic repository status
  ansible.builtin.shell: |
    source /opt/sharkey/restic-env.sh
    # </dev/null prevents hanging if it asks for a password
    restic snapshots --json --latest 1 --insecure-tls </dev/null
  args:
    executable: /bin/bash
  register: sharkey_restic_check_result
  become: true
  changed_when: false
  # Don't fail the playbook if this command fails (it will fail if repo is empty)
  failed_when: false

- name: Initialize Restic repository if missing
  ansible.builtin.shell: |
    source /opt/sharkey/restic-env.sh
    restic init --insecure-tls
  args:
    executable: /bin/bash
  become: true
  changed_when: true
  # Only init if the previous command failed AND the error indicates a missing config
  when:
    - sharkey_restic_check_result.rc != 0
    - "'unable to open config file' in sharkey_restic_check_result.stderr or 'Is there a repository' in sharkey_restic_check_result.stderr"

- name: Determine if restore is needed
  ansible.builtin.set_fact:
    sharkey_backup_found: "{{ (sharkey_restic_check.stdout | default('[]') | from_json | length > 0) }}"
  when: not sharkey_installed.stat.exists

- name: Copy docker-compose.yml for Sharkey
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/sharkey/docker-compose.yml
    mode: '0644'
  become: true
  register: sharkey_settings_result

- name: Copy default.yml for Sharkey
  ansible.builtin.template:
    src: default.yml.j2
    dest: /opt/sharkey/.config/default.yml
    mode: '0644'
  become: true
  register: sharkey_compose_result

- name: Copy docker.env for Sharkey
  ansible.builtin.template:
    src: docker.env.j2
    dest: /opt/sharkey/.config/docker.env
    mode: '0644'
  become: true
  register: sharkey_logo_result

# =============================================================================
# RESTORE FROM RESTIC (Fresh Install Only)
# =============================================================================

- name: Restore File Data from Restic
  ansible.builtin.shell: |
    source /opt/sharkey/restic-env.sh
    # Restore 'files' tag to /opt/sharkey/files
    restic restore latest --tag files --target / --insecure-tls
  args:
    executable: /bin/bash
  become: true
  register: sharkey_file_restore_result
  changed_when: sharkey_file_restore_result.rc == 0 and 'restoring' in sharkey_file_restore_result.stderr
  failed_when: sharkey_file_restore_result.rc != 0
  when:
    - not sharkey_installed.stat.exists
    - sharkey_backup_found | default(false)
    - not (sharkey_force_fresh | default(false))

- name: Set correct ownership on restored files
  ansible.builtin.file:
    path: /opt/sharkey/files
    owner: '991'
    group: '991'
    recurse: true
  become: true
  when:
    - not sharkey_installed.stat.exists
    - sharkey_backup_found | default(false)
    - not (sharkey_force_fresh | default(false))

- name: Start Sharkey container (Required for DB Restore)
  community.docker.docker_compose_v2:
    project_src: /opt/sharkey
    state: present
    pull: "always"
  become: true

- name: Wait for PostgreSQL Container
  community.docker.docker_container_exec:
    container: sharkey-db-1
    command: pg_isready -U misskey-user -d misskey
  register: sharkey_db_check
  until: sharkey_db_check.rc == 0
  retries: 60
  delay: 5
  become: true
  changed_when: false
  when:
    - not sharkey_installed.stat.exists
    - sharkey_backup_found | default(false)
    - not (sharkey_force_fresh | default(false))

- name: Restore Database from Restic
  ansible.builtin.shell: |
    set -o pipefail
    source /opt/sharkey/restic-env.sh
    restic dump --tag database latest dump.sql --insecure-tls | \
    docker exec -i sharkey-db-1 psql -U misskey-user -d misskey
  args:
    executable: /bin/bash
  become: true
  register: sharkey_db_restore_result
  failed_when: sharkey_db_restore_result.rc != 0
  changed_when: "'restored' in sharkey_db_restore_result.stderr or sharkey_db_restore_result.rc == 0"
  when:
    - not sharkey_installed.stat.exists
    - sharkey_backup_found | default(false)
    - not (sharkey_force_fresh | default(false))
  notify: Restart Sharkey

- name: Wait for Sharkey to initialize
  ansible.builtin.wait_for:
    port: 3000
    delay: 10
    timeout: 120

- name: Create setup complete state file
  ansible.builtin.file:
    path: /opt/sharkey/.setup_complete
    state: touch
    mode: '0644'
  become: true
  when: not sharkey_setup_complete.stat.exists

- name: Create installed state file
  ansible.builtin.file:
    path: /opt/sharkey/.installed
    state: touch
    mode: '0644'
  become: true
  when: not sharkey_installed.stat.exists

# =============================================================================
# BACKUP AUTOMATION
# =============================================================================

- name: Create backup script
  ansible.builtin.template:
    src: sharkey-backup.sh.j2
    dest: /opt/sharkey/backup.sh
    mode: '0755'
  become: true

- name: Create backup cron job
  ansible.builtin.cron:
    name: "Sharkey daily backup"
    minute: "0"
    hour: "3"
    job: "/opt/sharkey/backup.sh >> /var/log/sharkey-backup.log 2>&1"
    user: root
  become: true

- name: Create log rotation for backup
  ansible.builtin.copy:
    dest: /etc/logrotate.d/sharkey-backup
    content: |
      /var/log/sharkey-backup.log {
          daily
          rotate 7
          compress
          missingok
          notifempty
      }
    mode: '0644'
  become: true

# =============================================================================
# FIREWALL
# =============================================================================

- name: Allow HTTP
  community.general.ufw:
    rule: allow
    port: 3000
    proto: tcp
  notify: Reload ufw
