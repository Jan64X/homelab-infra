---
# =============================================================================
# PACKAGE INSTALLATION
# =============================================================================

- name: Install required packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-requests
      - python3-docker
      - restic
      - cron
    state: present
    update_cache: true
  become: true

- name: Create directory for Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  become: true

- name: Set Docker GPG key permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.asc
    mode: '0644'
    owner: root
    group: root
  become: true

- name: Get system architecture
  ansible.builtin.command: dpkg --print-architecture
  register: system_arch
  changed_when: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ system_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  become: true

- name: Install Docker and Docker Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

# =============================================================================
# CHECK FOR EXISTING INSTALLATION
# =============================================================================

- name: Check if UniFi Controller is already installed
  ansible.builtin.stat:
    path: /var/lib/unifi/data/system.properties
  register: unifi_existing

- name: Set installation type
  ansible.builtin.set_fact:
    is_fresh_install: "{{ not unifi_existing.stat.exists }}"

# =============================================================================
# CREDENTIALS GENERATION
# =============================================================================

- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ playbook_dir }}/credentials/hosts/{{ inventory_hostname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Generate database passwords
  ansible.builtin.set_fact:
    mongo_root_password: "{{ lookup('ansible.builtin.password',
                            playbook_dir + '/credentials/hosts/' + inventory_hostname + '/mongo_root_password.txt' +
                            ' chars=ascii_letters,digits length=32') }}"
    mongo_unifi_password: "{{ lookup('ansible.builtin.password',
                            playbook_dir + '/credentials/hosts/' + inventory_hostname + '/mongo_unifi_password.txt' +
                            ' chars=ascii_letters,digits length=32') }}"
    restic_unifi_password: "{{ lookup('ansible.builtin.password',
                              playbook_dir + '/credentials/hosts/' + inventory_hostname + '/restic_unifi_password.txt' +
                              ' chars=ascii_letters,digits length=32') }}"

# =============================================================================
# DIRECTORY STRUCTURE
# =============================================================================

- name: Create UniFi Controller directories
  ansible.builtin.file:
    path: "{{ directory_item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/unifi
    - /etc/unifi/db-init
    - /opt/unifi
  loop_control:
    loop_var: directory_item
  become: true

# =============================================================================
# RESTIC CONFIGURATION & DISCOVERY
# =============================================================================

- name: Create Restic credentials file
  ansible.builtin.template:
    src: restic-env.sh.j2
    dest: /opt/unifi/restic-env.sh
    mode: '0600'
    owner: root
    group: root
  become: true

- name: Check for existing backups (Fresh Install Only)
  ansible.builtin.shell: |
    source /opt/unifi/restic-env.sh
    restic snapshots --json --latest 1 --insecure-tls || echo "[]"
  args:
    executable: /bin/bash
  register: restic_check
  become: true
  changed_when: false
  when: is_fresh_install

- name: Check Restic repository status
  ansible.builtin.shell: |
    source /opt/unifi/restic-env.sh
    # </dev/null prevents hanging if it asks for a password
    restic snapshots --json --latest 1 --insecure-tls </dev/null
  args:
    executable: /bin/bash
  register: restic_check_result
  become: true
  changed_when: false
  # Don't fail the playbook if this command fails (it will fail if repo is empty)
  failed_when: false

- name: Initialize Restic repository if missing
  ansible.builtin.shell: |
    source /opt/unifi/restic-env.sh
    restic init --insecure-tls
  args:
    executable: /bin/bash
  become: true
  # Only init if the previous command failed AND the error indicates a missing config
  when:
    - restic_check_result.rc != 0
    - "'unable to open config file' in restic_check_result.stderr or 'Is there a repository' in restic_check_result.stderr"

- name: Determine if restore is needed
  ansible.builtin.set_fact:
    backup_found: "{{ (restic_check.stdout | default('[]') | from_json | length > 0) }}"
  when: is_fresh_install

# =============================================================================
# MONGODB INITIALIZATION
# =============================================================================

- name: Create MongoDB init script
  ansible.builtin.template:
    src: init-mongo.sh.j2
    dest: /etc/unifi/db-init/init-mongo.sh
    mode: '0755'
  become: true
  register: mongo_init_result

# =============================================================================
# DOCKER COMPOSE DEPLOYMENT
# =============================================================================

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /etc/unifi/docker-compose.yml
    mode: '0644'
  become: true
  register: compose_result

- name: Start UniFi Controller with Docker Compose
  community.docker.docker_compose_v2:
    project_src: /etc/unifi
    state: present
    pull: "always"
  become: true

- name: Wait for UniFi Controller to initialize
  ansible.builtin.wait_for:
    port: 8443
    delay: 30
    timeout: 300

# =============================================================================
# RESTORE FROM RESTIC (Fresh Install Only)
# =============================================================================

- name: Create backup directory structure for restore
  ansible.builtin.file:
    path: /var/lib/unifi/data/backup/autobackup
    state: directory
    owner: '999'
    group: '999'
    mode: '0755'
  become: true
  when:
    - is_fresh_install
    - backup_found
    - not (unifi_force_fresh | default(false))

- name: Restore UniFi Backup Files from Restic
  ansible.builtin.shell: |
    source /opt/unifi/restic-env.sh
    # Restore 'unifi-backup' tag to root (restic preserves full paths)
    restic restore latest --tag unifi-backup --target / --insecure-tls
  args:
    executable: /bin/bash
  become: true
  register: file_restore_result
  changed_when: file_restore_result.rc == 0 and 'restoring' in file_restore_result.stderr
  failed_when: file_restore_result.rc != 0
  when:
    - is_fresh_install
    - backup_found
    - not (unifi_force_fresh | default(false))

- name: Set correct ownership on restored backup files
  ansible.builtin.file:
    path: /var/lib/unifi/data/backup/autobackup
    owner: '999'
    group: '999'
    recurse: true
  become: true
  when:
    - is_fresh_install
    - backup_found
    - not (unifi_force_fresh | default(false))

- name: Restart UniFi Controller after restore
  community.docker.docker_compose_v2:
    project_src: /etc/unifi
    state: restarted
  become: true
  when:
    - is_fresh_install
    - backup_found
    - not (unifi_force_fresh | default(false))

- name: Wait for UniFi to be ready after restore
  ansible.builtin.wait_for:
    port: 8443
    delay: 10
    timeout: 300
  when:
    - is_fresh_install
    - backup_found
    - not (unifi_force_fresh | default(false))

# =============================================================================
# BACKUP AUTOMATION
# =============================================================================

- name: Create backup script
  ansible.builtin.template:
    src: unifi-backup.sh.j2
    dest: /opt/unifi/backup.sh
    mode: '0755'
  become: true

- name: Create backup cron job
  ansible.builtin.cron:
    name: "UniFi Controller daily backup"
    minute: "0"
    hour: "3"
    job: "/opt/unifi/backup.sh >> /var/log/unifi-backup.log 2>&1"
    user: root
  become: true

- name: Create log rotation for backup
  ansible.builtin.copy:
    dest: /etc/logrotate.d/unifi-backup
    content: |
      /var/log/unifi-backup.log {
          daily
          rotate 7
          compress
          missingok
          notifempty
      }
    mode: '0644'
  become: true

# =============================================================================
# FIREWALL
# =============================================================================

- name: Allow UniFi Controller web interface
  community.general.ufw:
    rule: allow
    port: 8443
    proto: tcp
  notify: Reload ufw

- name: Allow UniFi STUN port
  community.general.ufw:
    rule: allow
    port: 3478
    proto: udp
  notify: Reload ufw

- name: Allow UniFi device discovery
  community.general.ufw:
    rule: allow
    port: 10001
    proto: udp
  notify: Reload ufw

- name: Allow UniFi device communication
  community.general.ufw:
    rule: allow
    port: 8080
    proto: tcp
  notify: Reload ufw

- name: Allow UniFi L2 discovery (optional)
  community.general.ufw:
    rule: allow
    port: 1900
    proto: udp
  notify: Reload ufw

- name: Allow UniFi guest portal HTTPS redirect (optional)
  community.general.ufw:
    rule: allow
    port: 8843
    proto: tcp
  notify: Reload ufw

- name: Allow UniFi guest portal HTTP redirect (optional)
  community.general.ufw:
    rule: allow
    port: 8880
    proto: tcp
  notify: Reload ufw

- name: Allow UniFi mobile throughput test (optional)
  community.general.ufw:
    rule: allow
    port: 6789
    proto: tcp
  notify: Reload ufw

- name: Allow UniFi remote syslog (optional)
  community.general.ufw:
    rule: allow
    port: 5514
    proto: udp
  notify: Reload ufw

# =============================================================================
# FIRST RUN INSTRUCTIONS
# =============================================================================

- name: Display first run instructions
  ansible.builtin.debug:
    msg: |
      ===================================================================
      UniFi Controller installation complete!

      {% if is_fresh_install and backup_found %}
      ✓ Restored from Restic backup
      Your UniFi Controller should be ready with all previous data.
      {% elif is_fresh_install %}
      ⚠ Fresh installation - no backup found to restore
      Access the web interface at: https://{{ ansible_host }}:8443
      Follow the setup wizard to configure your controller.
      {% else %}
      ✓ Existing installation updated
      {% endif %}

      Web interface: https://{{ ansible_host }}:8443
      ===================================================================
  when: is_fresh_install or (backup_found is defined and backup_found)

# =============================================================================
# Note: Automatic adoption may not work due to docker networking, use cli to manually set an adopt address
# =============================================================================
