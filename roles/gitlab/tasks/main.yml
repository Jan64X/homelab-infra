---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - openssh-server
      - ca-certificates
      - tzdata
      - perl
      - postfix
      - gpg
      - restic
      - cron
    state: present
    update_cache: true

- name: Download GitLab GPG key
  ansible.builtin.get_url:
    url: https://packages.gitlab.com/gitlab/gitlab-ce/gpgkey
    dest: /usr/share/keyrings/gitlab_gitlab-ce-archive-keyring.asc
    mode: '0644'

- name: Add GitLab repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/gitlab_gitlab-ce-archive-keyring.asc]
      https://packages.gitlab.com/gitlab/gitlab-ce/debian/
      {{ ansible_facts['distribution_release'] }} main
    state: present
    filename: gitlab_gitlab-ce

- name: Check if GitLab is already managed by Ansible
  ansible.builtin.stat:
    path: /etc/gitlab/.ansible_managed
  register: gitlab_managed

# =============================================================================
# FIRST TIME SETUP - RESTIC CONFIGURATION & DISCOVERY
# =============================================================================

- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ playbook_dir }}/credentials/hosts/{{ inventory_hostname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Generate GitLab passwords
  ansible.builtin.set_fact:
    gitlab_root_password: "{{ lookup('ansible.builtin.password',
                         playbook_dir + '/credentials/hosts/' + inventory_hostname + '/gitlab_root_pass.txt' +
                         ' chars=ascii_letters,digits length=32') }}"
    gitlab_restic_password: "{{ lookup('ansible.builtin.password',
                              playbook_dir + '/credentials/hosts/' + inventory_hostname + '/restic_gitlab_password.txt' +
                              ' chars=ascii_letters,digits length=32') }}"

- name: Create GitLab scripts directory
  ansible.builtin.file:
    path: /opt/gitlab
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Create Restic credentials file
  ansible.builtin.template:
    src: restic-env.sh.j2
    dest: /opt/gitlab/restic-env.sh
    mode: '0600'
    owner: root
    group: root

- name: Check for existing backups (First Time Only)
  ansible.builtin.shell: |
    source /opt/gitlab/restic-env.sh
    restic snapshots --json --latest 1 --insecure-tls || echo "[]"
  args:
    executable: /bin/bash
  register: gitlab_restic_check
  changed_when: false
  when: not gitlab_managed.stat.exists

- name: Check Restic repository status
  ansible.builtin.shell: |
    source /opt/gitlab/restic-env.sh
    restic snapshots --json --latest 1 --insecure-tls </dev/null
  args:
    executable: /bin/bash
  register: gitlab_restic_check_result
  changed_when: false
  failed_when: false

- name: Initialize Restic repository if missing
  ansible.builtin.shell: |
    source /opt/gitlab/restic-env.sh
    restic init --insecure-tls
  args:
    executable: /bin/bash
  changed_when: true
  when:
    - gitlab_restic_check_result.rc != 0
    - "'unable to open config file' in gitlab_restic_check_result.stderr or 'Is there a repository' in gitlab_restic_check_result.stderr"

- name: Determine if restore is needed
  ansible.builtin.set_fact:
    gitlab_backup_found: "{{ (gitlab_restic_check.stdout | default('[]') | from_json | length > 0) }}"
  when: not gitlab_managed.stat.exists

- name: Set restoration facts
  ansible.builtin.set_fact:
    gitlab_should_restore_backup: "{{ gitlab_force_restore | default(false) or (not gitlab_managed.stat.exists and gitlab_backup_found | default(false)) }}"
    gitlab_is_fresh_install: "{{ gitlab_force_fresh_install | default(false) or (not gitlab_managed.stat.exists and not (gitlab_backup_found | default(false)) and not (gitlab_force_restore | default(false))) }}"
  when: not gitlab_managed.stat.exists

- name: Debug restoration decisions
  ansible.builtin.debug:
    msg:
      - "Will restore backup: {{ gitlab_should_restore_backup | default(false) }}"
      - "Will do fresh install: {{ gitlab_is_fresh_install | default(false) }}"
  when: not gitlab_managed.stat.exists

# =============================================================================
# GITLAB INSTALLATION AND BASIC CONFIGURATION
# =============================================================================

- name: Check if GitLab configuration directory exists
  ansible.builtin.stat:
    path: /etc/gitlab
  register: gitlab_config_dir

- name: Create GitLab configuration directory (if needed)
  ansible.builtin.file:
    path: /etc/gitlab
    state: directory
    mode: '0755'
  when: not gitlab_config_dir.stat.exists

- name: Restore GitLab secrets from Restic (first time setup)
  ansible.builtin.shell: |
    source /opt/gitlab/restic-env.sh
    restic restore latest --tag gitlab-secrets --target / --insecure-tls
  args:
    executable: /bin/bash
  when:
    - not gitlab_managed.stat.exists
    - gitlab_should_restore_backup | default(false)
  changed_when: true

- name: Restore GitLab configuration from Restic (first time setup)
  ansible.builtin.shell: |
    source /opt/gitlab/restic-env.sh
    restic restore latest --tag gitlab-config --target / --insecure-tls
  args:
    executable: /bin/bash
  when:
    - not gitlab_managed.stat.exists
    - gitlab_should_restore_backup | default(false)
  changed_when: true

- name: Configure GitLab (initial configuration)
  ansible.builtin.template:
    src: gitlab.rb.j2
    dest: /etc/gitlab/gitlab.rb
    mode: '0600'
    owner: root
    group: root

- name: Install GitLab CE (skip initial reconfigure)
  ansible.builtin.apt:
    name: gitlab-ce
    state: present
    update_cache: true
  environment:
    GITLAB_SKIP_RECONFIGURE: "true"

- name: Create GitLab backups directory
  ansible.builtin.file:
    path: /var/opt/gitlab/backups
    state: directory
    owner: git
    group: git
    mode: '0700'

# =============================================================================
# INITIAL RECONFIGURE (REQUIRED BEFORE RESTORE)
# =============================================================================

- name: Run initial GitLab reconfigure (first time only)
  ansible.builtin.command: gitlab-ctl reconfigure
  when: not gitlab_managed.stat.exists
  register: initial_reconfigure

- name: Wait for GitLab to be initially ready (first time only)
  ansible.builtin.uri:
    url: "http://localhost:{{ gitlab_port | default('80') }}/-/health"
    method: GET
    status_code: 200
  register: gitlab_health
  until: gitlab_health.status == 200
  retries: 30
  delay: 10
  when: not gitlab_managed.stat.exists and initial_reconfigure.changed

# =============================================================================
# BACKUP RESTORATION (IF AVAILABLE)
# =============================================================================

- name: Restore from latest backup archive (first time setup)
  ansible.builtin.shell: |
    source /opt/gitlab/restic-env.sh
    
    # Stop GitLab services for restore
    gitlab-ctl stop puma
    gitlab-ctl stop sidekiq
    
    # Get latest backup snapshot
    latest_snapshot=$(restic snapshots --tag gitlab-archive --json --insecure-tls | jq -r '.[-1].short_id')
    
    if [ -n "$latest_snapshot" ]; then
      echo "Restoring from snapshot: $latest_snapshot"
      
      # Restore backup tar to local directory
      mkdir -p /var/opt/gitlab/backups
      restic dump "$latest_snapshot" --tag gitlab-archive --insecure-tls | tar -xzf - -C /var/opt/gitlab/backups/
      
      # Get backup timestamp from filename
      backup_file=$(ls -t /var/opt/gitlab/backups/*_gitlab_backup.tar 2>/dev/null | head -1)
      backup_timestamp=$(basename "$backup_file" | sed 's/_gitlab_backup\.tar$//')
      
      # Set correct ownership
      chown -R git:git /var/opt/gitlab/backups/
      
      # Restore the backup
      gitlab-backup restore BACKUP="$backup_timestamp" force=yes
      
      echo "Backup restoration completed successfully"
    else
      echo "No backup snapshot found, skipping restore"
    fi
  args:
    executable: /bin/bash
  register: gitlab_backup_restore_result
  when: gitlab_should_restore_backup | default(false)
  changed_when: true

# =============================================================================
# FRESH INSTALL PASSWORD SETUP
# =============================================================================

- name: Generate random root password (fresh install only)
  ansible.builtin.set_fact:
    gitlab_root_password: >-
      {{ lookup('ansible.builtin.password',
      playbook_dir + '/credentials/hosts/' + inventory_hostname + '/gitlab_root_pass.txt' +
      ' chars=ascii_letters,digits,!@#$%^&*()_+-= length=32') }}
  when: is_fresh_install | default(false)

- name: Set GitLab root password (fresh install only)
  ansible.builtin.shell: |
    gitlab-rails runner "
    user = User.find_by(username: 'root')
    user.password = '{{ gitlab_root_password }}'
    user.password_confirmation = '{{ gitlab_root_password }}'
    user.save!
    puts 'Root password updated successfully'
    "
  when: is_fresh_install | default(false)
  no_log: true

# =============================================================================
# FINAL RECONFIGURATION AND RESTART
# =============================================================================

- name: Final GitLab reconfigure (after restore/password setup)
  ansible.builtin.command: gitlab-ctl reconfigure
  when: not gitlab_managed.stat.exists and (should_restore_backup | default(false) or is_fresh_install | default(false))
  register: final_reconfigure

- name: Restart GitLab services (after restore/password setup)
  ansible.builtin.command: gitlab-ctl restart
  when: not gitlab_managed.stat.exists and (should_restore_backup | default(false) or is_fresh_install | default(false))

- name: Wait for GitLab to be ready (final check)
  ansible.builtin.uri:
    url: "http://localhost:{{ gitlab_port | default('80') }}/-/health"
    method: GET
    status_code: 200
  register: gitlab_final_health
  until: gitlab_final_health.status == 200
  retries: 30
  delay: 10
  when: not gitlab_managed.stat.exists

# =============================================================================
# ONGOING CONFIGURATION (RUNS ON EVERY PLAYBOOK RUN)
# =============================================================================

- name: Ensure GitLab configuration is up to date (ongoing)
  ansible.builtin.template:
    src: gitlab.rb.j2
    dest: /etc/gitlab/gitlab.rb
    mode: '0600'
    owner: root
    group: root
  notify:
    - Reconfigure GitLab
    - Restart GitLab

# =============================================================================
# BACKUP SYSTEM SETUP
# =============================================================================

- name: Create GitLab backup script directory
  ansible.builtin.file:
    path: /opt/gitlab
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Create GitLab Restic backup script
  ansible.builtin.template:
    src: gitlab-backup-restic.sh.j2
    dest: /opt/gitlab/backup.sh
    mode: '0755'
    owner: root
    group: root

- name: Create backup cron job
  ansible.builtin.cron:
    name: "GitLab daily backup to S3"
    minute: "0"
    hour: "2"
    job: "/opt/gitlab/backup.sh > /var/log/gitlab-backup.log 2>&1"
    user: root

- name: Create backup log rotation
  ansible.builtin.copy:
    dest: /etc/logrotate.d/gitlab-backup
    content: |
      /var/log/gitlab-backup.log {
          daily
          rotate 7
          compress
          delaycompress
          missingok
          notifempty
          create 0644 root root
      }
    mode: '0644'

# =============================================================================
# SYSTEM CONFIGURATION
# =============================================================================

- name: Allow HTTP traffic
  community.general.ufw:
    rule: allow
    port: 80
    proto: tcp

- name: Enable and start GitLab services
  ansible.builtin.service:
    name: "{{ service_item }}"
    state: started
    enabled: true
  loop:
    - gitlab-runsvdir
  loop_control:
    loop_var: service_item

# =============================================================================
# CLEANUP AND FINALIZATION
# =============================================================================

- name: Mark GitLab as Ansible managed
  ansible.builtin.copy:
    content: "GitLab managed by Ansible on {{ ansible_facts['date_time']['iso8601'] }}"
    dest: /etc/gitlab/.ansible_managed
    owner: root
    group: root
    mode: '0644'
    force: false
