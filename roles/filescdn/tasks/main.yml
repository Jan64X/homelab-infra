---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - cifs-utils
      - python3
      - python3-argon2
      - libcap2-bin
      - nginx
      - netcat-openbsd
    state: present
    update_cache: true

- name: Create filescdn directories
  ansible.builtin.file:
    path: "{{ directory }}"
    state: directory
    mode: '0755'
  loop:
    - /mnt/filescdn
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled
    - /var/www/cdn
  loop_control:
    loop_var: directory

- name: Create systemd NAS credentials file
  ansible.builtin.copy:
    content: |
      username={{ filescdn_nas_user }}
      password={{ filescdn_nas_password }}
    dest: /etc/filescdn-nas-credentials
    mode: '0600'
    owner: root
    group: root
  become: true
  no_log: true

- name: Create wait-for-nas systemd service
  ansible.builtin.template:
    src: wait-for-nas.service.j2
    dest: /etc/systemd/system/wait-for-nas.service
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Create systemd mount unit for NAS
  ansible.builtin.template:
    src: mntcdnfiles.mount.j2
    dest: /etc/systemd/system/mnt-filescdn.mount
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Enable wait-for-nas service
  ansible.builtin.systemd:
    name: wait-for-nas.service
    enabled: true
    daemon_reload: true
  become: true

- name: Enable and start NAS mount
  ansible.builtin.systemd:
    name: mnt-filescdn.mount
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Wait for mount to be ready
  ansible.builtin.wait_for:
    path: /mnt/filescdn
    state: present
    timeout: 60
  become: true

- name: Verify filescdn directory is accessible
  ansible.builtin.command: ls -A /mnt/filescdn
  register: filescdn_mount_check
  changed_when: false
  become: true

- name: Configure nginx for filescdn
  ansible.builtin.template:
    src: nginx-filescdn.conf.j2
    dest: /etc/nginx/sites-available/filescdn.conf
    mode: '0644'
  become: true
  notify: Restart nginx

- name: Enable nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/filescdn.conf
    dest: /etc/nginx/sites-enabled/filescdn.conf
    state: link
  become: true
  notify: Restart nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: true
  notify: Restart nginx

- name: Deploy custom index.html
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/cdn/index.html
    mode: '0644'
    owner: root
    group: root
  become: true

- name: Stop and disable default nginx service
  ansible.builtin.systemd:
    name: nginx
    state: stopped
    enabled: false
  become: true

- name: Create custom nginx systemd service for filescdn
  ansible.builtin.template:
    src: nginx-filescdn.service.j2
    dest: /etc/systemd/system/nginx-filescdn.service
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Enable and start custom nginx service
  ansible.builtin.systemd:
    name: nginx-filescdn.service
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Allow nginx port 8080
  community.general.ufw:
    rule: allow
    port: 8080
    proto: tcp
  notify: Reload ufw

