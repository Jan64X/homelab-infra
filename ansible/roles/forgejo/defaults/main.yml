---
# Forgejo Docker image version
forgejo_version: "14"

# Network ports
forgejo_port: 3001
forgejo_ssh_port: 2222
forgejo_domain: "{{ homelab_service_domains.forgejo | default('git.' ~ homelab_base_domain) }}"
forgejo_root_url: "https://{{ forgejo_domain }}/"

# Service configuration
forgejo_disable_registration: true
forgejo_require_signin: false
forgejo_actions_enabled: true

# Restore configuration
# Set to true to skip automatic restore from backup on fresh install
forgejo_force_fresh: false

# Set to true to force backup restore logic even if Forgejo appears already initialized.
# Useful when a partial first run created app.ini before restore could run.
forgejo_force_restore_from_backup: false
