---
# =============================================================================
# PACKAGE INSTALLATION
# =============================================================================

- name: Install forgejo host packages
  ansible.builtin.apt:
    name:
      - cifs-utils
      - default-mysql-client
      - netcat-openbsd
      - cron
      - zstd
    state: present
    update_cache: true
  become: true

# =============================================================================
# CHECK FOR EXISTING INSTALLATION
# =============================================================================

- name: Check if Forgejo is already installed
  ansible.builtin.stat:
    path: /var/lib/forgejo/data/gitea/conf/app.ini
  register: forgejo_existing

- name: Set installation type
  ansible.builtin.set_fact:
    is_fresh_install: "{{ not forgejo_existing.stat.exists }}"

- name: Decide whether backup restore path should run
  ansible.builtin.set_fact:
    forgejo_should_attempt_restore: >-
      {{
        (is_fresh_install or (forgejo_force_restore_from_backup | default(false))) and
        not (forgejo_force_fresh | default(false))
      }}

# =============================================================================
# CREDENTIALS GENERATION
# =============================================================================

- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ playbook_dir }}/credentials/hosts/{{ inventory_hostname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Generate database passwords
  ansible.builtin.set_fact:
    forgejo_db_password: "{{ lookup('ansible.builtin.password',
                         playbook_dir + '/credentials/hosts/' + inventory_hostname + '/forgejo_db_password.txt' +
                         ' chars=ascii_letters,digits length=32') }}"
    forgejo_db_root_password: "{{ lookup('ansible.builtin.password',
                              playbook_dir + '/credentials/hosts/' + inventory_hostname + '/forgejo_db_root_password.txt' +
                              ' chars=ascii_letters,digits length=32') }}"

# =============================================================================
# DIRECTORY STRUCTURE
# =============================================================================

- name: Create Forgejo directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
  loop:
    - { path: /opt/forgejo, owner: '1000', group: '1000' }
    - { path: /var/lib/forgejo/data, owner: '1000', group: '1000' }
    - { path: /var/lib/forgejo/mysql, owner: '1000', group: '1000' }
    - { path: /mnt/forgejo-backups, owner: '0', group: '0' }
  become: true

# =============================================================================
# NAS BACKUP MOUNT & DISCOVERY
# =============================================================================

- name: Create Forgejo NAS credentials file
  ansible.builtin.copy:
    content: |
      username={{ forgejo_nas_user }}
      password={{ forgejo_nas_password }}
    dest: /etc/forgejo-backup-nas-credentials
    mode: '0600'
    owner: root
    group: root
  become: true
  no_log: true

- name: Create wait-for-nas systemd service
  ansible.builtin.template:
    src: wait-for-nas.service.j2
    dest: /etc/systemd/system/wait-for-nas.service
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Create Forgejo backup mount unit
  ansible.builtin.template:
    src: mnt-forgejo-backups.mount.j2
    dest: /etc/systemd/system/mnt-forgejo\x2dbackups.mount
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Enable wait-for-nas service
  ansible.builtin.systemd:
    name: wait-for-nas.service
    enabled: true
    daemon_reload: true
  become: true

- name: Enable and start Forgejo backup mount
  ansible.builtin.systemd:
    name: mnt-forgejo\x2dbackups.mount
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Verify Forgejo backup mount is active
  ansible.builtin.command: mountpoint -q /mnt/forgejo-backups
  register: forgejo_backup_mount_check
  changed_when: false
  become: true

- name: Find Forgejo data backups
  ansible.builtin.find:
    paths: /mnt/forgejo-backups
    patterns: "forgejo-data-*.tar.zst"
    use_regex: false
  register: forgejo_data_backups
  when: forgejo_should_attempt_restore

- name: Find Forgejo database backups
  ansible.builtin.find:
    paths: /mnt/forgejo-backups
    patterns: "forgejo-db-*.sql.zst"
    use_regex: false
  register: forgejo_db_backups
  when: forgejo_should_attempt_restore

- name: Determine if restore is needed
  ansible.builtin.set_fact:
    backup_found: >-
      {{
        (forgejo_data_backups.files | default([]) | length > 0) and
        (forgejo_db_backups.files | default([]) | length > 0)
      }}
  when: forgejo_should_attempt_restore

- name: Set latest Forgejo backup files
  ansible.builtin.set_fact:
    forgejo_latest_data_backup: "{{ forgejo_data_backups.files | sort(attribute='mtime') | last }}"
    forgejo_latest_db_backup: "{{ forgejo_db_backups.files | sort(attribute='mtime') | last }}"
  when:
    - forgejo_should_attempt_restore
    - backup_found

# =============================================================================
# DOCKER COMPOSE DEPLOYMENT
# =============================================================================

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/forgejo/docker-compose.yml
    mode: '0644'
  become: true
  notify: Restart Forgejo

- name: Restore Forgejo file data from SMB archive
  ansible.builtin.shell: |
    tar --zstd -xpf "{{ forgejo_latest_data_backup.path }}" -C /
  args:
    executable: /bin/bash
  become: true
  register: forgejo_file_restore_result
  changed_when: forgejo_file_restore_result.rc == 0
  failed_when: forgejo_file_restore_result.rc != 0
  when:
    - forgejo_should_attempt_restore
    - backup_found

- name: Set correct ownership on restored data
  ansible.builtin.file:
    path: /var/lib/forgejo/data
    owner: '1000'
    group: '1000'
    recurse: true
  become: true
  when:
    - forgejo_should_attempt_restore
    - backup_found

- name: Remove stale Forgejo authorized_keys file
  ansible.builtin.file:
    path: /var/lib/forgejo/data/git/.ssh/authorized_keys
    state: absent
  become: true
  when: forgejo_should_attempt_restore

- name: Start Forgejo with Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/forgejo
    state: present
    pull: "always"
  become: true

- name: Wait for Forgejo to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ forgejo_port | default('3001') }}"
    method: GET
    status_code: 200
  register: forgejo_health
  until: forgejo_health.status == 200
  retries: 30
  delay: 10

- name: Wait for Database Container
  community.docker.docker_container_exec:
    container: forgejo-db
    command: mysqladmin ping -h localhost -u root -p{{ forgejo_db_root_password }} --silent
  register: forgejo_db_check
  until: forgejo_db_check.rc == 0
  retries: 60
  delay: 5
  become: true
  changed_when: false
  when:
    - forgejo_should_attempt_restore
    - backup_found

- name: Verify database is ready for connections
  community.docker.docker_container_exec:
    container: forgejo-db
    command: mysql -uroot -p{{ forgejo_db_root_password }} -e "SELECT 1" --silent
  register: forgejo_db_ready_check
  until: forgejo_db_ready_check.rc == 0
  retries: 30
  delay: 2
  become: true
  changed_when: false
  when:
    - forgejo_should_attempt_restore
    - backup_found

- name: Restore Forgejo database from SMB archive
  ansible.builtin.shell: |
    set -o pipefail
    zstd -dc "{{ forgejo_latest_db_backup.path }}" | \
    docker exec -i forgejo-db mysql -uroot -p{{ forgejo_db_root_password }} forgejo
  args:
    executable: /bin/bash
  become: true
  register: forgejo_db_restore_result
  failed_when: forgejo_db_restore_result.rc != 0
  changed_when: forgejo_db_restore_result.rc == 0
  when:
    - forgejo_should_attempt_restore
    - backup_found
  notify: Restart Forgejo

# =============================================================================
# BACKUP AUTOMATION
# =============================================================================

- name: Create backup script
  ansible.builtin.template:
    src: forgejo-backup.sh.j2
    dest: /opt/forgejo/backup.sh
    mode: '0755'
  become: true

- name: Find legacy Forgejo backup environment files
  ansible.builtin.find:
    paths: /opt/forgejo
    patterns: "r*ic-env.sh"
    file_type: file
    recurse: false
  register: forgejo_legacy_backup_env_files
  become: true

- name: Remove legacy Forgejo backup environment files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ forgejo_legacy_backup_env_files.files }}"
  become: true

- name: Create backup cron job
  ansible.builtin.cron:
    name: "Forgejo daily backup"
    minute: "0"
    hour: "3"
    job: "/opt/forgejo/backup.sh >> /var/log/forgejo-backup.log 2>&1"
    user: root
  become: true

- name: Create log rotation for backup
  ansible.builtin.copy:
    dest: /etc/logrotate.d/forgejo-backup
    content: |
      /var/log/forgejo-backup.log {
          daily
          rotate 7
          compress
          missingok
          notifempty
      }
    mode: '0644'
  become: true

# =============================================================================
# FIREWALL
# =============================================================================

- name: Allow Forgejo ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "{{ forgejo_ssh_port | default('2222') }}"
  become: true
  notify: Reload ufw

# =============================================================================
# FIRST RUN INSTRUCTIONS
# =============================================================================

- name: Display first run instructions
  ansible.builtin.debug:
    msg: |
      ===================================================================
      Forgejo installation complete!

      {% if is_fresh_install and backup_found %}
      ✓ Restored from SMB backup archives
      Your Forgejo instance should be ready with all previous data.
      {% elif is_fresh_install %}
      ⚠ Fresh installation - no backup found to restore
      Access the web installer at: https://{{ forgejo_domain }}/install
      Admin username: Choose any username EXCEPT 'admin' (reserved)
      Admin email: Use @{{ forgejo_domain }}
      {% else %}
      ✓ Existing installation updated
      {% endif %}

      Web interface: https://{{ forgejo_domain }}
      SSH clone URL: ssh://git@{{ forgejo_domain }}:{{ forgejo_ssh_port }}/user/repo.git
      ===================================================================
  when: is_fresh_install or (backup_found is defined and backup_found)
