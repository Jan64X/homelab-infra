---
# =============================================================================
# PROMTAIL INSTALLATION
# =============================================================================

- name: Get system architecture
  ansible.builtin.command: dpkg --print-architecture
  register: promtail_system_arch
  changed_when: false

- name: Check installed promtail version from version file
  ansible.builtin.slurp:
    src: /etc/promtail_version
  register: promtail_installed_version_file
  failed_when: false
  changed_when: false

- name: Set current promtail version fact
  ansible.builtin.set_fact:
    promtail_current_version: >-
      {{ (promtail_installed_version_file.content | b64decode | trim)
      if promtail_installed_version_file.content is defined else 'not_installed' }}

- name: Set promtail installation needed fact
  ansible.builtin.set_fact:
    promtail_install_needed: "{{ promtail_current_version != promtail_version }}"

- name: Download and install promtail
  when: promtail_install_needed
  block:
    - name: Download promtail
      ansible.builtin.get_url:
        url: >-
          https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-{{ promtail_system_arch.stdout }}.zip
        dest: /tmp/promtail.zip
        mode: "0644"

    - name: Install unzip for extraction
      ansible.builtin.apt:
        name: unzip
        state: present
      become: true

    - name: Extract promtail
      ansible.builtin.unarchive:
        src: /tmp/promtail.zip
        dest: /tmp
        remote_src: true

    - name: Stop promtail service if running
      ansible.builtin.service:
        name: promtail
        state: stopped
      become: true
      failed_when: false

    - name: Copy promtail binary
      ansible.builtin.copy:
        src: /tmp/promtail-linux-{{ promtail_system_arch.stdout }}
        dest: /usr/local/bin/promtail
        mode: "0755"
        owner: root
        group: root
        remote_src: true
      become: true

    - name: Create version file for promtail
      ansible.builtin.copy:
        content: "{{ promtail_version }}"
        dest: /etc/promtail_version
        mode: "0644"
      become: true

    - name: Clean up temporary promtail files
      ansible.builtin.file:
        path: "{{ promtail_temp_file }}"
        state: absent
      loop:
        - /tmp/promtail.zip
        - /tmp/promtail-linux-{{ promtail_system_arch.stdout }}
      loop_control:
        loop_var: promtail_temp_file

# =============================================================================
# PROMTAIL CONFIGURATION
# =============================================================================

- name: Check if docker group exists
  ansible.builtin.getent:
    database: group
    key: docker
  register: promtail_docker_group
  failed_when: false

- name: Create promtail user
  ansible.builtin.user:
    name: promtail
    system: true
    shell: /bin/false
    home: /
    create_home: false
    groups: >-
      {{ ['systemd-journal', 'adm'] +
         (['docker'] if promtail_docker_group.ansible_facts.getent_group.docker is defined else []) }}
    append: true
  become: true
  notify: Restart promtail

- name: Create promtail config directory
  ansible.builtin.file:
    path: /etc/promtail
    state: directory
    mode: "0755"
    owner: root
    group: root
  become: true

- name: Create promtail positions directory
  ansible.builtin.file:
    path: /var/lib/promtail
    state: directory
    mode: "0755"
    owner: promtail
    group: promtail
  become: true

- name: Configure promtail
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: /etc/promtail/promtail.yml
    mode: "0644"
    owner: root
    group: root
  become: true
  notify: Restart promtail

# =============================================================================
# SYSTEMD SERVICE
# =============================================================================

- name: Create promtail systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Promtail Log Collector
      Documentation=https://grafana.com/docs/loki/latest/clients/promtail/
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=promtail
      Group=promtail
      Type=simple
      ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/promtail.yml
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/promtail.service
    mode: "0644"
  become: true
  notify:
    - Reload systemd
    - Restart promtail

- name: Enable and start promtail
  ansible.builtin.service:
    name: promtail
    state: started
    enabled: true
  become: true
