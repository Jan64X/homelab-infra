---
- name: Install packages required for Docker
  ansible.builtin.apt:
    name: "{{ docker_apt_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Install Docker apt signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Read dpkg architecture
  ansible.builtin.command: dpkg --print-architecture
  register: docker_architecture
  changed_when: false

- name: Configure Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_architecture.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_facts['distribution_release'] }} stable
    state: present
    filename: docker

- name: Install Docker engine packages
  ansible.builtin.apt:
    name: "{{ docker_engine_packages }}"
    state: present
    update_cache: true

- name: Ensure docker service is enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add primary system user to docker group
  ansible.builtin.user:
    name: "{{ system_user }}"
    groups: docker
    append: true
  when: system_user is defined

- name: Create shared Docker network
  community.docker.docker_network:
    name: "{{ docker_network_name }}"
    state: present
