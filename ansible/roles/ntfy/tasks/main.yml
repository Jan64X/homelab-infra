---
# =============================================================================
# DIRECTORY STRUCTURE
# =============================================================================

- name: Create ntfy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/ntfy
    - /var/lib/ntfy/cache
    - /var/lib/ntfy/data
  become: true

# =============================================================================
# DOCKER COMPOSE DEPLOYMENT
# =============================================================================

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/ntfy/docker-compose.yml
    mode: '0644'
  become: true
  notify: Restart ntfy

- name: Start ntfy with Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/ntfy
    state: present
    pull: "always"
  become: true

- name: Wait for ntfy to be healthy
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ ntfy_bind_port }}/v1/health"
    method: GET
    status_code: 200
    return_content: true
  register: ntfy_health
  until: ntfy_health.status == 200
  retries: 30
  delay: 5

# =============================================================================
# POST-INSTALL INFO
# =============================================================================

- name: Display ntfy installation info
  ansible.builtin.debug:
    msg: |
      ===================================================================
      ntfy installation complete!

      Web interface: https://{{ ntfy_domain }}
      TLS: handled by the shared ingress role

      To send a test notification:
        curl -d "Hello from ntfy!" https://{{ ntfy_domain }}/test

      To subscribe to a topic via the web UI:
        https://{{ ntfy_domain }}/test

      ===================================================================
