---
# =============================================================================
# PACKAGE INSTALLATION
# =============================================================================

- name: Install navidrome host packages
  ansible.builtin.apt:
    name:
      - cifs-utils
      - python3-passlib
      - netcat-openbsd
      - cron
      - zstd
    state: present
    update_cache: true
  become: true

# =============================================================================
# CHECK FOR EXISTING INSTALLATION
# =============================================================================

- name: Check if Navidrome is already installed
  ansible.builtin.stat:
    path: /opt/navidrome/data/navidrome.db
  register: navidrome_existing
  become: true

- name: Set installation type
  ansible.builtin.set_fact:
    navidrome_is_fresh_install: "{{ not navidrome_existing.stat.exists }}"

# =============================================================================
# CREDENTIALS GENERATION
# =============================================================================

- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ playbook_dir }}/credentials/hosts/{{ inventory_hostname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

# =============================================================================
# DIRECTORY STRUCTURE
# =============================================================================

- name: Create Navidrome directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
  loop:
    - { path: /opt/navidrome, owner: '1000', group: '1000' }
    - { path: /opt/navidrome/data, owner: '1000', group: '1000' }
    - { path: /mnt/music, owner: '1000', group: '1000' }
    - { path: /mnt/navidrome-backups, owner: '0', group: '0' }
  become: true

# =============================================================================
# NAS MOUNT CONFIGURATION
# =============================================================================

- name: Create systemd music-share credentials file
  ansible.builtin.copy:
    content: |
      username={{ navidrome_nas_user }}
      password={{ navidrome_nas_password }}
    dest: /etc/navidrome-nas-credentials
    mode: '0600'
    owner: root
    group: root
  become: true
  no_log: true

- name: Create systemd backup-share credentials file
  ansible.builtin.copy:
    content: |
      username={{ navidrome_nas_user }}
      password={{ navidrome_nas_password }}
    dest: /etc/navidrome-backup-nas-credentials
    mode: '0600'
    owner: root
    group: root
  become: true
  no_log: true

- name: Create systemd mount unit for music share
  ansible.builtin.template:
    src: mnt-music.mount.j2
    dest: /etc/systemd/system/mnt-music.mount
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Create systemd mount unit for backup share
  ansible.builtin.template:
    src: mnt-navidrome-backups.mount.j2
    dest: /etc/systemd/system/mnt-navidrome\x2dbackups.mount
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Create wait-for-nas systemd service
  ansible.builtin.template:
    src: wait-for-nas.service.j2
    dest: /etc/systemd/system/wait-for-nas.service
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Enable wait-for-nas service
  ansible.builtin.systemd:
    name: wait-for-nas.service
    enabled: true
    daemon_reload: true
  become: true

- name: Enable and start NAS mounts
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - mnt-music.mount
    - mnt-navidrome\x2dbackups.mount
  become: true

- name: Wait for mounts to be ready
  ansible.builtin.wait_for:
    path: "{{ item }}"
    state: present
    timeout: 60
  loop:
    - /mnt/music
    - /mnt/navidrome-backups
  become: true

- name: Verify music files are accessible
  ansible.builtin.command: ls -A /mnt/music
  register: navidrome_music_check
  changed_when: false
  failed_when: navidrome_music_check.stdout == ""
  become: true

- name: Verify Navidrome backup mount is active
  ansible.builtin.command: mountpoint -q /mnt/navidrome-backups
  register: navidrome_backup_mount_check
  changed_when: false
  become: true

- name: Find Navidrome backups
  ansible.builtin.find:
    paths: /mnt/navidrome-backups
    patterns: "navidrome-data-*.tar.zst"
    use_regex: false
  register: navidrome_backup_files
  when: navidrome_is_fresh_install

- name: Determine if restore is needed
  ansible.builtin.set_fact:
    navidrome_backup_found: >-
      {{ (navidrome_backup_files.files | default([]) | length > 0) }}
  when: navidrome_is_fresh_install

- name: Set latest Navidrome backup file
  ansible.builtin.set_fact:
    navidrome_latest_backup: "{{ navidrome_backup_files.files | sort(attribute='mtime') | last }}"
  when:
    - navidrome_is_fresh_install
    - navidrome_backup_found

# =============================================================================
# DOCKER COMPOSE DEPLOYMENT
# =============================================================================

- name: Create docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/navidrome/docker-compose.yml
    mode: '0644'
    owner: 1000
    group: 1000
  become: true

- name: Start Navidrome with Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/navidrome
    state: present
    pull: "always"
  become: true

- name: Wait for Navidrome to be ready
  ansible.builtin.wait_for:
    port: "{{ navidrome_bind_port }}"
    delay: 10
    timeout: 120

# =============================================================================
# RESTORE FROM SMB ARCHIVES (Fresh Install Only)
# =============================================================================

- name: Restore Navidrome data from SMB archive
  ansible.builtin.shell: |
    cd /opt/navidrome
    docker compose down
    tar --zstd -xpf "{{ navidrome_latest_backup.path }}" -C /
    chown -R 1000:1000 /opt/navidrome/data
    chmod 644 /opt/navidrome/data/navidrome.db
    docker compose up -d
  args:
    executable: /bin/bash
  become: true
  register: navidrome_restore_result
  changed_when: navidrome_restore_result.rc == 0
  failed_when: navidrome_restore_result.rc != 0
  when:
    - navidrome_is_fresh_install
    - navidrome_backup_found
    - not (navidrome_force_fresh | default(false))

- name: Wait for Navidrome after restore
  ansible.builtin.wait_for:
    port: "{{ navidrome_bind_port }}"
    delay: 10
    timeout: 120
  when:
    - navidrome_is_fresh_install
    - navidrome_backup_found
    - not (navidrome_force_fresh | default(false))

# =============================================================================
# SYSTEMD SERVICE CONFIGURATION
# =============================================================================

- name: Create navidrome systemd service
  ansible.builtin.template:
    src: navidrome.service.j2
    dest: /etc/systemd/system/navidrome.service
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Enable and start navidrome service
  ansible.builtin.systemd:
    name: navidrome.service
    enabled: true
    state: started
    daemon_reload: true
  become: true

# =============================================================================
# BACKUP AUTOMATION
# =============================================================================

- name: Create backup script
  ansible.builtin.template:
    src: navidrome-backup.sh.j2
    dest: /opt/navidrome/backup.sh
    mode: '0755'
  become: true

- name: Find legacy Navidrome backup environment files
  ansible.builtin.find:
    paths: /opt/navidrome
    patterns: "r*ic-env.sh"
    file_type: file
    recurse: false
  register: navidrome_legacy_backup_env_files
  become: true

- name: Remove legacy Navidrome backup environment files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ navidrome_legacy_backup_env_files.files }}"
  become: true

- name: Create backup cron job
  ansible.builtin.cron:
    name: "Navidrome daily backup"
    minute: "0"
    hour: "3"
    job: "/opt/navidrome/backup.sh >> /var/log/navidrome-backup.log 2>&1"
    user: root
  become: true

- name: Create log rotation for backup
  ansible.builtin.copy:
    dest: /etc/logrotate.d/navidrome-backup
    content: |
      /var/log/navidrome-backup.log {
          daily
          rotate 7
          compress
          missingok
          notifempty
      }
    mode: '0644'
  become: true

# =============================================================================
# LEGACY CLEANUP
# =============================================================================

- name: Remove old NAS backup directory mount
  ansible.posix.mount:
    path: /mnt/navidrome_backup
    state: absent
  become: true

- name: Remove old backup script
  ansible.builtin.file:
    path: /opt/navidrome/backup_navidrome.sh
    state: absent
  become: true

- name: Remove old backup cron job
  ansible.builtin.cron:
    name: "Backup Navidrome to NAS"
    state: absent
  become: true

# =============================================================================
# FIRST RUN INSTRUCTIONS
# =============================================================================

- name: Display first run instructions
  ansible.builtin.debug:
    msg: |
      ===================================================================
      Navidrome installation complete!

      {% if navidrome_is_fresh_install and navidrome_backup_found %}
      ✓ Restored from SMB backup archive
      Your Navidrome instance should be ready with all previous data.
      {% elif navidrome_is_fresh_install %}
      ⚠ Fresh installation - no backup found to restore
      Access the web interface at: https://{{ navidrome_domain }}
      Create your admin account on first login.
      {% else %}
      ✓ Existing installation updated
      {% endif %}

      Web interface: https://{{ navidrome_domain }}
      Music library: /mnt/music (mounted read-only from NAS)
      ===================================================================
  when: >-
    navidrome_is_fresh_install or
    (navidrome_backup_found is defined and navidrome_backup_found)
