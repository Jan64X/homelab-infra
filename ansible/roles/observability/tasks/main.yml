---
# =============================================================================
# PACKAGE INSTALLATION
# =============================================================================

- name: Install observability host packages
  ansible.builtin.apt:
    name:
      - python3-requests
      - cifs-utils
      - netcat-openbsd
      - cron
      - zstd
    state: present
    update_cache: true
  become: true

# =============================================================================
# CHECK FOR EXISTING INSTALLATION
# =============================================================================

- name: Check if Observability is already installed
  ansible.builtin.stat:
    path: /etc/monitoring/.ansible_managed
  register: observability_existing
  become: true

- name: Set installation type
  ansible.builtin.set_fact:
    observability_is_fresh_install: "{{ not observability_existing.stat.exists }}"

# =============================================================================
# CREDENTIALS GENERATION
# =============================================================================

- name: Create credentials directory
  ansible.builtin.file:
    path: "{{ playbook_dir }}/credentials/hosts/{{ inventory_hostname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Generate Grafana admin password
  ansible.builtin.set_fact:
    observability_grafana_admin_password: >-
      {{ lookup('ansible.builtin.password',
      playbook_dir + '/credentials/hosts/' + inventory_hostname +
      '/grafana_admin_password.txt chars=ascii_letters,digits length=32') }}

# =============================================================================
# DIRECTORY STRUCTURE
# =============================================================================

- name: Create monitoring directories
  ansible.builtin.file:
    path: "{{ directory_item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/monitoring
    - /etc/monitoring/prometheus
    - /etc/monitoring/loki
    - /etc/monitoring/grafana
    - /etc/monitoring/grafana/dashboards
    - /etc/monitoring/grafana/provisioning
    - /etc/monitoring/grafana/provisioning/dashboards
    - /etc/monitoring/grafana/provisioning/datasources
    - /var/lib/prometheus
    - /var/lib/grafana
    - /var/lib/loki
    - /mnt/observability-backups
  loop_control:
    loop_var: directory_item
  become: true

- name: Set ownership for Grafana directory
  ansible.builtin.file:
    path: /var/lib/grafana
    owner: 472
    group: 472
    recurse: true
  become: true

- name: Set ownership for Prometheus directory
  ansible.builtin.file:
    path: /var/lib/prometheus
    owner: 65534
    group: 65534
    recurse: true
  become: true

- name: Set ownership for Loki directory
  ansible.builtin.file:
    path: /var/lib/loki
    owner: 10001
    group: 10001
    recurse: true
  become: true

# =============================================================================
# BACKUP MOUNT & DISCOVERY
# =============================================================================

- name: Create Observability NAS credentials file
  ansible.builtin.copy:
    content: |
      username={{ observability_nas_user }}
      password={{ observability_nas_password }}
    dest: /etc/observability-backup-nas-credentials
    mode: '0600'
    owner: root
    group: root
  become: true
  no_log: true

- name: Create wait-for-nas systemd service
  ansible.builtin.template:
    src: wait-for-nas.service.j2
    dest: /etc/systemd/system/wait-for-nas.service
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Create Observability backup mount unit
  ansible.builtin.template:
    src: mnt-observability-backups.mount.j2
    dest: /etc/systemd/system/mnt-observability\x2dbackups.mount
    mode: '0644'
    owner: root
    group: root
  become: true
  notify: Reload systemd

- name: Enable wait-for-nas service
  ansible.builtin.systemd:
    name: wait-for-nas.service
    enabled: true
    daemon_reload: true
  become: true

- name: Enable and start Observability backup mount
  ansible.builtin.systemd:
    name: mnt-observability\x2dbackups.mount
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Verify Observability backup mount is active
  ansible.builtin.command: mountpoint -q /mnt/observability-backups
  register: observability_backup_mount_check
  changed_when: false
  become: true

- name: Find Observability backup archives
  ansible.builtin.find:
    paths: /mnt/observability-backups
    patterns: "observability-state-*.tar.zst"
    use_regex: false
  register: observability_backup_files
  when: observability_is_fresh_install

- name: Determine if restore is needed
  ansible.builtin.set_fact:
    observability_backup_found: "{{ observability_backup_files.files | default([]) | length > 0 }}"
  when: observability_is_fresh_install

- name: Set latest Observability backup file
  ansible.builtin.set_fact:
    observability_latest_backup: "{{ observability_backup_files.files | sort(attribute='mtime') | last }}"
  when:
    - observability_is_fresh_install
    - observability_backup_found

# =============================================================================
# CONFIGURATION FILES
# =============================================================================

- name: Configure Prometheus
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/monitoring/prometheus/prometheus.yml
    mode: '0644'
  become: true
  notify: Restart monitoring stack

- name: Configure Loki
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: /etc/monitoring/loki/loki-config.yml
    mode: '0644'
  become: true

- name: Configure Grafana datasource
  ansible.builtin.template:
    src: datasource.yml.j2
    dest: /etc/monitoring/grafana/provisioning/datasources/prometheus.yml
    mode: '0644'
  become: true

- name: Configure Grafana dashboard provisioning
  ansible.builtin.template:
    src: dashboard-provider.yml.j2
    dest: /etc/monitoring/grafana/provisioning/dashboards/default.yml
    mode: '0644'
  become: true

- name: Copy docker-compose.yml for monitoring stack
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /etc/monitoring/docker-compose.yml
    mode: '0644'
  become: true

# =============================================================================
# DOCKER COMPOSE DEPLOYMENT
# =============================================================================

- name: Stop monitoring stack before WAL repair
  community.docker.docker_compose_v2:
    project_src: /etc/monitoring
    state: absent
  become: true
  when: observability_repair_wal | default(false) | bool

- name: Remove potentially corrupted WAL directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/prometheus/wal
    - /var/lib/prometheus/chunks_head
    - /var/lib/loki/wal
  become: true
  when: observability_repair_wal | default(false) | bool

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: /etc/monitoring
    state: present
    pull: "always"
  become: true

- name: Wait for Prometheus to be ready
  ansible.builtin.wait_for:
    port: "{{ observability_prometheus_port }}"
    delay: 10
    timeout: 120

- name: Wait for Grafana to be ready
  ansible.builtin.wait_for:
    port: "{{ observability_grafana_port }}"
    delay: 10
    timeout: 120

- name: Wait for Loki to be ready
  ansible.builtin.wait_for:
    port: "{{ observability_loki_port }}"
    delay: 10
    timeout: 120

# =============================================================================
# RESTORE FROM SMB ARCHIVE (Fresh Install Only)
# =============================================================================

- name: Restore Observability data from SMB archive
  ansible.builtin.shell: |
    cd /etc/monitoring
    docker compose down
    tar --zstd -xpf "{{ observability_latest_backup.path }}" -C /
    chown -R 65534:65534 /var/lib/prometheus
    chown -R 472:472 /var/lib/grafana
    chown -R 10001:10001 /var/lib/loki
    docker compose up -d
  args:
    executable: /bin/bash
  become: true
  register: observability_restore_result
  changed_when: observability_restore_result.rc == 0
  failed_when: observability_restore_result.rc != 0
  when:
    - observability_is_fresh_install
    - observability_backup_found
    - not (observability_force_fresh | default(false))

- name: Wait for services after restore
  ansible.builtin.wait_for:
    port: "{{ item }}"
    delay: 10
    timeout: 120
  loop:
    - "{{ observability_prometheus_port }}"
    - "{{ observability_grafana_port }}"
    - "{{ observability_loki_port }}"
  when:
    - observability_is_fresh_install
    - observability_backup_found
    - not (observability_force_fresh | default(false))

# =============================================================================
# BACKUP AUTOMATION
# =============================================================================

- name: Create backup script
  ansible.builtin.template:
    src: observability-backup.sh.j2
    dest: /etc/monitoring/backup.sh
    mode: '0755'
  become: true

- name: Find legacy observability backup environment files
  ansible.builtin.find:
    paths: /etc/monitoring
    patterns: "r*ic-env.sh"
    file_type: file
    recurse: false
  register: observability_legacy_backup_env_files
  become: true

- name: Remove legacy observability backup environment files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ observability_legacy_backup_env_files.files }}"
  become: true

- name: Create backup cron job
  ansible.builtin.cron:
    name: "Observability weekly backup"
    minute: "0"
    hour: "4"
    weekday: "0"
    job: "/etc/monitoring/backup.sh >> /var/log/observability-backup.log 2>&1"
    user: root
  become: true

- name: Create log rotation for backup
  ansible.builtin.copy:
    dest: /etc/logrotate.d/observability-backup
    content: |
      /var/log/observability-backup.log {
          daily
          rotate 7
          compress
          missingok
          notifempty
      }
    mode: '0644'
  become: true

# =============================================================================
# FINALIZATION
# =============================================================================

- name: Mark monitoring as Ansible managed
  ansible.builtin.copy:
    content: "Monitoring managed by Ansible on {{ ansible_facts['date_time']['iso8601'] }}"
    dest: /etc/monitoring/.ansible_managed
    owner: root
    group: root
    mode: '0644'
    force: false
  become: true

# =============================================================================
# FIRST RUN INSTRUCTIONS
# =============================================================================

- name: Display first run instructions
  ansible.builtin.debug:
    msg: |
      ===================================================================
      Observability stack installation complete!

      {% if observability_is_fresh_install and observability_backup_found %}
      Restored from SMB backup archive
      Your Prometheus, Grafana, and Loki instances should be ready with all previous data.
      {% elif observability_is_fresh_install %}
      Fresh installation - no backup found to restore
      Access Grafana at: https://{{ observability_domain }}
      Username: admin
      Password: {{ observability_grafana_admin_password }}
      {% else %}
      Existing installation updated
      {% endif %}

      Grafana: https://{{ observability_domain }}
      Prometheus: http://127.0.0.1:{{ observability_prometheus_port }}
      Loki: http://127.0.0.1:{{ observability_loki_port }}
      ===================================================================
  when: >-
    observability_is_fresh_install or
    (observability_backup_found is defined and observability_backup_found)
